{% extends "base.html" %}
{% block content %}
<div class="page-hero" style="height:70vh;">
  <div class="page-hero-img" style="background-image:url('/static/images/kitchen.jpg');background-size:cover;background-position:center;"></div>
  <div class="page-hero-overlay"></div>
  <div class="page-hero-content">
    <div class="hero-badge">Kitchen Renovations</div>
    <h1>Kitchens,<br><em>Rebuilt</em></h1>
    <p>Full kitchen renovations across Melbourne's west.</p>
    <a href="/contact" class="btn-white">Get a Quote</a>
  </div>
</div>

<div class="section">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;">
    <div>
      <span class="section-label reveal">Kitchens</span>
      <h2 class="reveal reveal-delay-1">Cabinetry, Benchtops<br><em style="color:#4d8c2f;">and Layout</em></h2>
    </div>
    <div class="reveal reveal-delay-2">
      <img src="/static/images/kitchen.jpg" alt="Kitchen renovation" style="width:100%;height:480px;object-fit:cover;border-radius:24px;box-shadow:0 32px 80px rgba(0,0,0,0.12);">
    </div>
  </div>
</div>

<div class="green-strip">
  <h2 class="reveal">Planning a Kitchen Renovation?</h2>
  <p class="reveal reveal-delay-1">Get in touch to talk through your project.</p>
  <a href="/contact" class="btn-white reveal reveal-delay-2">Get a Quote</a>
</div>
{% endblock %}
